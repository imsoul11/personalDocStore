swagger: "2.0"
info:
  title: docstore API
  version: "1.0"
basePath: /
schemes:
  - http
consumes:
  - application/json
produces:
  - application/json

paths:
  /users/register:
    post:
      summary: Register a new user
      consumes: [application/json]
      produces: [application/json]
      parameters:
        - in: body
          name: body
          required: true
          schema:
            type: object
            required: [email, password]
            properties:
              email:    { type: string, format: email }
              password: { type: string }
      responses:
        201:
          description: Created
          schema:
            $ref: '#/definitions/AckResponse'
        400:
          description: Bad request
          schema:
            $ref: '#/definitions/ErrorResponse'
        409:
          description: Email already exists
          schema:
            $ref: '#/definitions/ErrorResponse'

  /users/login:
    post:
      summary: Login
      consumes: [application/json]
      produces: [application/json]
      parameters:
        - in: body
          name: body
          required: true
          schema:
            type: object
            required: [email, password]
            properties:
              email:    { type: string, format: email }
              password: { type: string }
      responses:
        200:
          description: OK
          schema:
            $ref: '#/definitions/LoginResponse'
        400:
          description: Bad request
          schema:
            $ref: '#/definitions/ErrorResponse'
        401:
          description: Invalid credentials
          schema:
            $ref: '#/definitions/ErrorResponse'

  /users/profile:
    get:
      summary: Get current user profile
      produces: [application/json]
      security:
        - Bearer: []
      responses:
        200:
          description: OK
          schema:
            $ref: '#/definitions/AckResponse'
        401:
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
    post:
      summary: Update user profile
      consumes: [application/json]
      produces: [application/json]
      security:
        - Bearer: []
      parameters:
        - in: body
          name: body
          schema:
            type: object
            properties:
              name:    { type: string }
              address: { type: string }
              dob:     { type: string, format: date }
      responses:
        200:
          description: OK
          schema:
            $ref: '#/definitions/AckResponse'
        400:
          description: Bad request
          schema:
            $ref: '#/definitions/ErrorResponse'
        401:
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'

  /documents:
    post:
      summary: Upload document
      consumes: [multipart/form-data]
      produces: [application/json]
      security:
        - Bearer: []
      parameters:
        - in: formData
          name: file
          type: file
          required: true
          description: The document file to upload
        - in: formData
          name: filename
          type: string
          description: Optional filename override
      responses:
        201:
          description: Created
          schema:
            $ref: '#/definitions/AckResponse'
        400:
          description: Bad request
          schema:
            $ref: '#/definitions/ErrorResponse'
        401:
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
    get:
      summary: List documents for the current user
      produces: [application/json]
      security:
        - Bearer: []
      responses:
        200:
          description: List of documents
          schema:
            $ref: '#/definitions/AckResponse'
        401:
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'

  /documents/{id}:
    get:
      summary: Get document by ID
      produces: [application/json]
      security:
        - Bearer: []
      parameters:
        - in: path
          name: id
          type: integer
          format: int64
          required: true
          description: Document ID
      responses:
        200:
          description: Document details
          schema:
            $ref: '#/definitions/AckResponse'
        404:
          description: Not found
          schema:
            $ref: '#/definitions/ErrorResponse'
        401:
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'

definitions:
  AckResponse:
    type: object
    required: [success, acknowledgement]
    properties:
      success:
        type: boolean
        example: true
      acknowledgement:
        type: string
        example: Request processed successfully

  LoginResponse:
    type: object
    required: [success, acknowledgement, token]
    properties:
      success:
        type: boolean
        example: true
      acknowledgement:
        type: string
        example: Login successful
      token:
        type: string

  ErrorResponse:
    type: object
    required: [success, acknowledgement, code, message]
    properties:
      success:
        type: boolean
        example: false
      acknowledgement:
        type: string
        example: Request failed
      code:
        type: integer
        format: int32
        example: 400
      message:
        type: string
        example: Invalid request payload
        
securityDefinitions:
  Bearer:
    type: apiKey
    in: header
    name: Authorization
    description: Bearer token (e.g. "Bearer &lt;token&gt;")

security: []
